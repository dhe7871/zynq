<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynq - The Messaging App</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=account_circle,call,chat,inventory_2,menu,person_search,side_navigation,star,view_cozy" />
    <!-- <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=person_search" /> -->
    <style>
        .material-symbols-outlined {
            font-variation-settings:
                'FILL' 0,
                'wght' 800,
                'GRAD' 0,
                'opsz' 48
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Arima:wght@100..700&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body class="arima">
    <nav class="navbar">
        <div>
            <a href="index.html"><img src="logo_1.png" alt="logo" class="logo_image"></a>
        </div>
        <!-- <div class="searchmenudiv">
            <div class="searchdiv"><input type="text" name="searchinput" id="searchinput" class="searchinput"
                    placeholder="Search Person..."></div>
            <div class="material-symbols-outlined menubtn" id="menubtn">menu</div>
        </div> -->
        <div class="material-symbols-outlined menubtn" id="menubtn">menu</div>
    </nav>

    <div class="menulist" id="menulist">
        <div class="menusection">
            <div class="menurow">
                <div class="material-symbols-outlined" style="font-weight: 400;">chat</div>
                <div class="menuoptext">Chats</div>
            </div>
            <div class="menurow">
                <div class="material-symbols-outlined" style="font-weight: 400;">call</div>
                <div class="menuoptext">Calls</div>
            </div>
            <div class="menurow">
                <div class="material-symbols-outlined" style="font-weight: 400;">view_cozy</div>
                <div class="menuoptext">Status</div>
            </div>
        </div>
        <div class="menusection">
            <div class="menurow">
                <div class="material-symbols-outlined" style="font-weight: 400;">star</div>
                <div class="menuoptext">Starred Messages</div>
            </div>
            <div class="menurow">
                <div class="material-symbols-outlined" style="font-weight: 400;">inventory_2</div>
                <div class="menuoptext">Archived Chats</div>
            </div>
        </div>
        <div class="menusection">
            <div class="menurow">
                <div class="material-symbols-outlined" style="font-weight: 400;">account_circle</div>
                <div class="menuoptext">Profile</div>
            </div>
        </div>
    </div>

    <div class="chats">
        <div class="nochatdiv">
            <p>
                There are No chats.<br>Go to
                <span class="searchbtn"><u>Search</u></span>
                to add a chat.
            </p>
        </div>
        <div class="chatdiv">
            <div class="chatcontacts" id="chatcontacts">
                <div class="searchdiv1">
                    <input type="text" name="searchinput1" id="searchinput1" class="searchinput1" placeholder="Search Person..." >
                </div>
                <div class="material-symbols-outlined person_search searchbtn">person_search</div>
                <!-- div.cc comes here dynamically from JS -->
            </div>

            <div class="chatroom" id="chatroom">
                <div class="chatroomnav" id="chatroomnav">
                    <img src="logo.png" alt="profile">
                    <div>
                        <div><b>Dheeraj</b></div>
                    </div>
                </div>


                <div class="chatboxdiv">
                    <input type="text" name="chatbox" id="chatbox">
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
